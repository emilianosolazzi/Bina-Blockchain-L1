name: Node.js packages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        package-directory:
          - l2-mining/js
          - l2-mining/miner-dashboard

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm
        cache-dependency-path: ${{ matrix.package-directory }}/package-lock.json

    - name: Install dependencies
      working-directory: ${{ matrix.package-directory }}
      run: npm ci

    - name: Validate package entrypoint
      working-directory: ${{ matrix.package-directory }}
      shell: bash
      run: |
        MAIN_FILE=$(node -p "require('./package.json').main || ''")
        if [ -n "$MAIN_FILE" ] && [ -f "$MAIN_FILE" ]; then
          node --check "$MAIN_FILE"
        else
          echo "No package main entrypoint found to syntax-check"
        fi
